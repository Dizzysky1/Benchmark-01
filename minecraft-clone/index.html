<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Craftbox — Minecraft-style Voxel Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
    user-select: none;
  }
  canvas { display: block; }
  #game { position: fixed; inset: 0; }
  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
    transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference;
  }
  #crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: #fff;
  }
  #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
  #crosshair::after { left: 0; top: 8px; width: 18px; height: 2px; }
  #hud {
    position: fixed; left: 0; right: 0; bottom: 18px;
    display: flex; justify-content: center; pointer-events: none;
  }
  #hotbar {
    display: flex; gap: 4px; padding: 4px;
    background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.25);
    border-radius: 4px;
  }
  .slot {
    width: 48px; height: 48px; background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: flex-end; justify-content: flex-end;
    position: relative; image-rendering: pixelated;
  }
  .slot.selected { border-color: #fff; box-shadow: 0 0 0 2px #000 inset; }
  .slot .icon { position: absolute; inset: 4px; background-size: cover; image-rendering: pixelated; }
  .slot .count { font-size: 12px; font-weight: bold; text-shadow: 1px 1px 0 #000; padding: 1px 3px; }
  #info {
    position: fixed; top: 8px; left: 8px; font-size: 12px;
    background: rgba(0,0,0,0.45); padding: 6px 8px; border-radius: 4px;
    font-family: "Menlo", monospace; line-height: 1.4; pointer-events: none;
  }
  #menu {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 10;
  }
  #menu h1 { font-size: 36px; margin: 0; letter-spacing: 2px; }
  #menu p { margin: 0; opacity: 0.85; max-width: 500px; text-align: center; }
  #menu button {
    background: #4a4; color: #fff; border: 2px solid #fff; padding: 10px 22px;
    font-size: 18px; cursor: pointer; border-radius: 2px;
  }
  #menu button:hover { background: #5b5; }
  #menu .controls { font-size: 12px; opacity: 0.8; text-align: left; }
  #menu .controls b { color: #ffd86b; }
  .hidden { display: none !important; }
  body.menu-open #hud, body.menu-open #info, body.menu-open #crosshair { display: none; }
  body:not(.game-started) #hud, body:not(.game-started) #info, body:not(.game-started) #crosshair { display: none; }
  #inventory-screen {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }
  .inv-panel {
    background: #2b2b2b; border: 3px solid #111; padding: 12px;
    display: flex; flex-direction: column; gap: 10px; color: #eee;
  }
  .inv-row { display: flex; gap: 3px; }
  .inv-title { font-size: 13px; font-weight: bold; color: #ddd; }
  .inv-slot {
    width: 42px; height: 42px; background: #555; border: 2px inset #888;
    position: relative; cursor: pointer;
  }
  .inv-slot:hover { background: #6b6b6b; }
  .inv-slot.out { background: #3a3a3a; border-color: #2a2a2a; cursor: default; }
  .inv-slot .icon { position: absolute; inset: 2px; background-size: cover; image-rendering: pixelated; pointer-events: none; }
  .inv-slot .count { position: absolute; right: 2px; bottom: 0; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 0 #000; pointer-events: none; }
  .craft-grid { display: grid; grid-template-columns: repeat(3, 42px); gap: 3px; }
  .craft-arrow { font-size: 22px; color: #999; padding: 0 8px; display: flex; align-items: center; }
  .craft-area { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div id="game"></div>
<div id="crosshair"></div>
<div id="info"></div>
<div id="hud"><div id="hotbar"></div></div>
<div id="inventory-screen" class="hidden"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
